name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --python 3.12

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --python 3.12

      - name: Build docs
        run: make docs-build-strict

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --python 3.12

      - name: Type check
        run: uv run ty check

  test:
    name: Test (Python ${{ matrix.python-version }}, Pydantic ${{ matrix.pydantic-profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            pydantic-profile: locked
            pydantic-spec: ""
          - python-version: "3.13"
            pydantic-profile: locked
            pydantic-spec: ""
          - python-version: "3.14"
            pydantic-profile: locked
            pydantic-spec: ""
          - python-version: "3.12"
            pydantic-profile: "2.12.3"
            pydantic-spec: "pydantic==2.12.3"
          - python-version: "3.14"
            pydantic-profile: latest
            pydantic-spec: "pydantic>=2.12.3,<3.0"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: Set up Python ${{ matrix.python-version }}
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install "$PYTHON_VERSION"

      - name: Install dependencies
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv sync --frozen --python "$PYTHON_VERSION"

      - name: Install Pydantic ${{ matrix.pydantic-profile }} endpoint
        if: matrix.pydantic-spec != ''
        env:
          PYDANTIC_SPEC: ${{ matrix.pydantic-spec }}
        run: >-
          uv pip install
          --python .venv/bin/python
          --upgrade
          --refresh-package pydantic
          --refresh-package pydantic-core
          "$PYDANTIC_SPEC"

      - name: Verify test runtime
        env:
          EXPECTED_PYTHON: ${{ matrix.python-version }}
          PYDANTIC_PROFILE: ${{ matrix.pydantic-profile }}
        run: |
          .venv/bin/python - <<'PY'
          import os
          from importlib.metadata import version
          from pathlib import Path
          import sys
          import tomllib

          expected_python = tuple(map(int, os.environ["EXPECTED_PYTHON"].split(".")))
          assert sys.version_info[:2] == expected_python, sys.version

          actual_pydantic = version("pydantic")
          profile = os.environ["PYDANTIC_PROFILE"]
          if profile == "locked":
              lock = tomllib.loads(Path("uv.lock").read_text(encoding="utf-8"))
              expected_pydantic = next(
                  package["version"]
                  for package in lock["package"]
                  if package["name"] == "pydantic"
              )
              assert actual_pydantic == expected_pydantic, (
                  actual_pydantic,
                  expected_pydantic,
              )
          elif profile == "2.12.3":
              assert actual_pydantic == "2.12.3", actual_pydantic
          else:
              release = tuple(map(int, actual_pydantic.split(".")[:3]))
              assert (2, 12, 3) <= release < (3, 0, 0), actual_pydantic

          print(f"Python {sys.version.split()[0]}, Pydantic {actual_pydantic} ({profile})")
          PY

      - name: Check installed dependencies
        run: uv pip check --python .venv/bin/python

      - name: Run tests
        run: .venv/bin/python -m pytest --cov=src --cov-report=xml --cov-report=term -v

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, docs, typecheck, test]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Verify built-package typing
        shell: bash
        run: |
          uv sync --frozen --python 3.12 --no-install-project

          mapfile -t WHEELS < <(find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -type f -name '*.whl')
          test "${#WHEELS[@]}" -eq 1

          VENV_DIR="$RUNNER_TEMP/built-package-typing-venv"
          CONSUMER_DIR="$RUNNER_TEMP/built-package-typing-consumer"
          uv venv --python 3.12 "$VENV_DIR"
          uv pip install --python "$VENV_DIR/bin/python" "${WHEELS[0]}" pytest
          mkdir -p "$CONSUMER_DIR"
          cp tests/typing/schema_family_contract.py "$CONSUMER_DIR/"
          cp tests/integration/test_consumer_scenario.py "$CONSUMER_DIR/"

          cd "$RUNNER_TEMP"
          "$GITHUB_WORKSPACE/.venv/bin/ty" check \
            --python "$VENV_DIR" \
            --project "$CONSUMER_DIR" \
            "$CONSUMER_DIR/schema_family_contract.py"
          "$VENV_DIR/bin/python" "$CONSUMER_DIR/schema_family_contract.py"
          "$VENV_DIR/bin/python" -m pytest "$CONSUMER_DIR/test_consumer_scenario.py"
          "$VENV_DIR/bin/python" - <<'PY'
          import os
          from pathlib import Path

          import pydantic_versions

          package_file = Path(pydantic_versions.__file__).resolve()
          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          assert not package_file.is_relative_to(workspace), package_file
          marker = package_file.with_name("py.typed")
          assert marker.is_file(), marker
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
