name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0 or v0.1.0)"
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  EXPECTED_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  UV_VERSION: "0.11.31"

jobs:
  build:
    name: Validate and build package
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release-metadata.outputs.prerelease }}
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate release metadata
        id: release-metadata
        run: >-
          uv run python scripts/validate_release.py
          "$EXPECTED_RELEASE_VERSION"
          --github-output "$GITHUB_OUTPUT"

      - name: Run release quality gates
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run ty check
          uv run pytest --cov=src --cov-report=term
          uv run zensical build --strict

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  test:
    name: Test ${{ matrix.package-format }} on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        package-format: [wheel, sdist]
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install "$PYTHON_VERSION"

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: ${{ runner.temp }}/dist

      - name: Install and test the built ${{ matrix.package-format }}
        working-directory: ${{ runner.temp }}
        env:
          PACKAGE_FORMAT: ${{ matrix.package-format }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          test ! -e "$GITHUB_WORKSPACE/pyproject.toml"

          case "$PACKAGE_FORMAT" in
            wheel) PACKAGE_GLOB="*.whl" ;;
            sdist) PACKAGE_GLOB="*.tar.gz" ;;
            *) exit 2 ;;
          esac

          mapfile -t PACKAGES < <(find "$RUNNER_TEMP/dist" -maxdepth 1 -type f -name "$PACKAGE_GLOB")
          test "${#PACKAGES[@]}" -eq 1

          VENV_DIR="$RUNNER_TEMP/venv-$PYTHON_VERSION-$PACKAGE_FORMAT"
          uv venv --python "$PYTHON_VERSION" "$VENV_DIR"
          uv pip install --python "$VENV_DIR/bin/python" "${PACKAGES[0]}"

          export EXPECTED_PYTHON="$PYTHON_VERSION"
          export EXPECTED_VENV="$VENV_DIR"
          "$VENV_DIR/bin/python" - <<'PY'
          import os
          from pathlib import Path
          import sys

          from pydantic import BaseModel
          import pydantic_versions
          from pydantic_versions import validate_versioned, versioned_schema

          expected_python = tuple(int(part) for part in os.environ["EXPECTED_PYTHON"].split("."))
          assert sys.version_info[:2] == expected_python, sys.version

          package_file = Path(pydantic_versions.__file__).resolve()
          venv_dir = Path(os.environ["EXPECTED_VENV"]).resolve()
          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          assert package_file.is_relative_to(venv_dir), package_file
          assert not package_file.is_relative_to(workspace), package_file

          @versioned_schema(name="release_smoke", versions=["1"], current="1")
          class SmokeConfig(BaseModel):
              enabled: bool

          result = validate_versioned(
              SmokeConfig,
              {"schema_version": "1", "enabled": True},
          )
          assert result.source_version == "1"
          assert result.current_model == SmokeConfig(enabled=True)
          PY

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pydantic-versions
    permissions:
      id-token: write # Required for PyPI trusted publishing.
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/pydantic-versions
    permissions:
      id-token: write # Required for PyPI trusted publishing.
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # Required to create the GitHub release.
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        # zizmor: ignore[superfluous-actions]
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.build.outputs.prerelease }}
